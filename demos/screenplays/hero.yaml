title: "Toolwright: The Immune System for AI Tools"
output: "hero"
variables:
  demo_dir: "{{tmp_dir}}/toolwright_hero"
settings:
  width: 720
  height: 580
  font_size: 17
  theme: "TokyoNightStorm"
  padding: 20
  window_bar: "Colorful"
  framerate: 60
  line_height: 1.15
  letter_spacing: 0
preinstall:
  - "rm -rf {{demo_dir}} && mkdir -p {{demo_dir}}/without {{demo_dir}}/with"
  - |
    python3 -c "
    import pathlib
    pathlib.Path('{{demo_dir}}/without/show.sh').write_text('''#!/bin/bash
    set -e
    echo 'Setting up MCP tools for GitHub API...'
    echo ''
    echo '  Writing tool config...'
    echo '  {'
    printf '    \"tools\": [{\"name\": \"list_repos\", ...}],\n'
    printf '    \"auth\": \"Bearer ghp_s3cr3tT0k3nH3r3\"\n'
    echo '  }'
    echo ''
    echo '  WARNING  Token visible in tool definition'
    echo '  WARNING  No approval required for new tools'
    echo '  WARNING  No drift detection'
    echo ''
    echo '  Starting MCP server...'
    echo '  Done -- 47 tools exposed'
    echo ''
    sleep 1
    echo '  --- 3 weeks later ---'
    echo ''
    echo '  FAIL  GitHub deprecated /user/repos'
    echo '  FAIL  Agent silently failing on 410'
    echo '  FAIL  No alerting or recovery path'
    ''')
    import os; os.chmod('{{demo_dir}}/without/show.sh', 0o755)
    "
  - |
    python3 -c "
    import pathlib
    pathlib.Path('{{demo_dir}}/with/show.sh').write_text('''#!/bin/bash
    set -e
    export PATH=/Users/thomasallicino/oss/toolwright/.venv/bin:\$PATH
    mkdir -p /tmp/tw_hero_gov && cd /tmp/tw_hero_gov
    toolwright create github --no-interactive 2>/dev/null
    echo ''
    echo '  Token: injected at runtime, never in context'
    echo ''
    sleep 1
    echo '  --- 3 weeks later ---'
    echo ''
    echo '  DRIFT    /user/repos returned 410 Gone'
    echo '  BREAKER  list_repos circuit tripped'
    echo '  HEAL     safe patch applied from snapshot'
    echo '  OK       Agent continues operating'
    ''')
    import os; os.chmod('{{demo_dir}}/with/show.sh', 0o755)
    "
scenarios:
  - label: "Without Toolwright"
    surface: "terminal"
    prompt:
      style: "macos"
      user: "user"
      host: "dev"
      path: "basename"
      symbol: "%"
    setup:
      - "cd {{demo_dir}}/without"
    actions:
      - type: "/bin/bash show.sh"
      - wait_for: "recovery path"
        wait_mode: "screen"
        wait_timeout: "20s"
      - sleep: "2s"

  - label: "With Toolwright"
    surface: "terminal"
    prompt:
      style: "macos"
      user: "user"
      host: "dev"
      path: "basename"
      symbol: "%"
    setup:
      - "cd {{demo_dir}}/with"
      - "export PATH=/Users/thomasallicino/oss/toolwright/.venv/bin:$PATH"
    actions:
      - type: "/bin/bash show.sh"
      - wait_for: "continues operating"
        wait_mode: "screen"
        wait_timeout: "60s"
      - sleep: "2s"
