title: "Toolwright: API Governance for AI Agents"
output: "hero"
variables:
  demo_dir: "{{tmp_dir}}/toolwright_hero"
settings:
  width: 1440
  height: 900
  font_size: 20
  theme: "TokyoNightStorm"
  padding: 24
  window_bar: "Colorful"
  framerate: 60
  line_height: 1.15
  letter_spacing: 0
preinstall:
  - "rm -rf {{demo_dir}} && mkdir -p {{demo_dir}}"
  - "cd {{demo_dir}} && PATH=$PATH:.venv/bin /Users/thomasallicino/oss/toolwright/.venv/bin/toolwright demo --generate-only --out ./demo 2>/dev/null"
scenarios:
  - label: "Compile & Govern"
    surface: "terminal"
    prompt:
      style: "macos"
      user: "user"
      host: "dev"
      path: "basename"
      symbol: "%"
    setup:
      - "cd {{demo_dir}}"
      - "export PATH=/Users/thomasallicino/oss/toolwright/.venv/bin:$PATH"
      - "export TOOLPACK=$(ls -d demo/toolpacks/*/toolpack.yaml 2>/dev/null | head -1)"
    actions:
      - type: "toolwright gate status --toolpack $TOOLPACK"
      - wait_for: "Pending: 8"
        wait_mode: "screen"
        wait_timeout: "10s"
      - sleep: "1200ms"
      - type: "toolwright gate allow --all --toolpack $TOOLPACK"
      - wait_for: "Approved 8"
        wait_mode: "screen"
        wait_timeout: "10s"
      - sleep: "1200ms"
      - type: "toolwright gate check --toolpack $TOOLPACK"
      - wait_for: "All tools approved"
        wait_mode: "screen"
        wait_timeout: "10s"
      - sleep: "2s"
