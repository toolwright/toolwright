name: slack
description: Slack Web API
hosts:
  - pattern: "slack.com"
    auth_header_name: Authorization
    auth_scheme: bearer
extra_headers: {}
setup_instructions_url: https://api.slack.com/docs
openapi_spec_url: null
rate_limit_hints: "Tier-based, typically 1-100 req/min depending on method"
usage_notes: "Most methods are under /api/. Uses Bot or User OAuth tokens."
rule_templates:
  - rate-control
probe_hints:
  expect_auth: true
  expect_openapi: false
