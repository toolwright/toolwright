name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Run tests
        run: pytest

      - name: Run Ruff
        run: ruff check toolwright tests

      - name: Run mypy
        run: mypy toolwright

      - name: Run proof smoke
        run: toolwright demo --smoke --smoke-scenarios basic_products

      - name: Wheel smoke
        shell: bash
        run: |
          set -euo pipefail

          wheel_dir="$(mktemp -d)"
          python -m venv "$wheel_dir/venv"
          "$wheel_dir/venv/bin/pip" install --upgrade pip
          "$wheel_dir/venv/bin/pip" install dist/toolwright-*.whl

          smoke_dir="$(mktemp -d)"
          "$wheel_dir/venv/bin/toolwright" --help >/dev/null
          "$wheel_dir/venv/bin/toolwright" demo --out "$smoke_dir/demo" >/dev/null

          toolpack_path="$(find "$smoke_dir/demo/toolpacks" -name toolpack.yaml | head -n 1)"
          test -n "$toolpack_path"
          "$wheel_dir/venv/bin/toolwright" config --toolpack "$toolpack_path" >/dev/null

          mkdir -p "$smoke_dir/github"
          (
            cd "$smoke_dir/github"
            "$wheel_dir/venv/bin/toolwright" create github >/dev/null
          )
